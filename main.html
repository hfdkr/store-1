<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style type="text/tailwindcss">
        @theme{
    --color-Blue-900: #313E51;
    --color-Grey-50: #F4F6FA;
    --color-red-500: #EE5454;
    --color-Blue-500: #306AFF;

    /* font */
    --font-rubik: "Rubik", sans-serif;
}

animation: var(--animate-bounce); /* bounce 1s infinite */
@keyframes gradientMove {
  0%, 100% {
    transform: translateY(-25%);
    animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
  }
  50% {
    transform: none;
    animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
  }
}

.animate-gradient {
  animation: gradientMove 3s ease infinite;
}
</style>

</head>

<body>

    <div
        class="min-h-screen  to-black flex items-center justify-center p-6 h-screen bg-[url('./images/bg-2.webp')] bg-no-repeat bg-cover bg-center " >

        <div class="w-full max-w-md rounded-3xl bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl p-8">

            <div class="flex flex-col items-center text-3xl font-bold text-white mb-8">
                <img src="./images/profile.svg" alt="profile" class="w-[100px] mb-2">
                <span
                    class="font-rubik font-extrabold text-[43px] text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 bg-[length:300%_300%] animate-[gradientMove_4s_ease_infinite] drop-shadow-[0_0_18px_rgba(34,211,238,0.7)] hover:scale-110 hover:drop-shadow-[0_0_28px_rgba(236,72,153,0.9)] transition-transform duration-300">
                    Login
                </span>
            </div>

            <form class="space-y-5">

                <!-- Password input -->
                <input type="text" value="username" placeholder="Entrer full name"
                    class="w-full px-4 py-3 rounded-xl border outline-none text-white text-[20px]">
                <div class="relative">
                    <input id="paswrd" type="password" placeholder="Enter password"
                        class="w-full px-4 py-3 rounded-xl border outline-none text-white text-[20px]">

                    <!-- Toggle icon -->
                    <button type="button" id="toggle" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer">
                        <img id="icon" src="./images/show.svg" class="w-6 h-6">
                    </button>
                </div>

                <!-- Message -->
                <h2 id="header" class="min-h-[28px] text-red-400 font-semibold text-center"></h2>

                <!-- Submit -->
                <input id="sbmt" type="submit" value="Login" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500
        text-white font-bold cursor-pointer">
                <a href="#" class="text-Blue-500 hover:cursor-pointer flex justify-center">Forgot
                    password ?</a>
            </form>
            <ol class="list-decimal pl-5 text-gray-300 space-y-[10px] mt-[20px]">
                <li id="lengthCheck" class="text-gray-400"> At least 8 characters</li>
                <li id="olperCheck" class="text-gray-400"> One uppercase letter</li>
                <li id="numberCheck" class="text-gray-400"> One number</li>
                <li id="symbolCheck" class="text-gray-400"> One symbol ! @ # $ %</li>
            </ol>

        </div>

    </div>

    <script>
        let paswrd = document.getElementById("paswrd");
        let sbmt = document.getElementById("sbmt");
        let header = document.getElementById("header");
        let toggle = document.getElementById("toggle");
        let icon = document.getElementById("icon");

        let list1 = document.getElementById("lengthCheck");
        let list2 = document.getElementById("olperCheck");
        let list3 = document.getElementById("numberCheck");
        let list4 = document.getElementById("symbolCheck");

        sbmt.addEventListener("click", function (e) {
            e.preventDefault();

            let value = paswrd.value;

            let validLength = value.length >= 8;
            let validUpper = /[A-Z]/.test(value);
            let validNumber = /\d/.test(value);
            let validSymbol = /[!@#$%]/.test(value);

            list1.style.color = validLength ? "green" : "red";
            list2.style.color = validUpper ? "green" : "red";
            list3.style.color = validNumber ? "green" : "red";
            list4.style.color = validSymbol ? "green" : "red";

            if (!validLength) {
                header.textContent = "Password must be at least 8 characters";
                header.style.color = "red";
                return;
            }

            if (!validUpper) {
                header.textContent = "Add at least one uppercase letter";
                header.style.color = "red";
                return;
            }

            if (!validNumber) {
                header.textContent = "Add at least one number";
                header.style.color = "red";
                return;
            }

            if (!validSymbol) {
                header.textContent = "Add at least one symbol (!@#$%)";
                header.style.color = "red";
                return;
            }

            header.textContent = "Password is strong";
            header.style.color = "green";
            window.location.href = "index.html";
        });

        toggle.addEventListener("click", function () {
            if (paswrd.type === "password") {
                paswrd.type = "text";
                icon.src = "./images/hidden.svg";
            } else {
                paswrd.type = "password";
                icon.src = "./images/show.svg";
            }
        });
    </script>

</body>

</html>
