<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
        rel="stylesheet">
    <title>Store-hafid</title>
    <style type="text/tailwindcss">
        @theme{
            /* colors  */
            --color-dark-cyan: #0E8784;
            --color-cyan: #66D2CF;
            --color-dark-blue: #333D4B;
            --color-pale-orange: #FDD6BA;
            --color-light-cream: #FEFCF7;
            --color-grey: #83888F;
            --color-disabled: #E2DEDB;
            --color-abled: #2C343E;
            /* fonts */
            --font-barlow: "Barlow", sans-serif;
            --font-fraunces: "Fraunces", serif;
            /* text-size  */
            --text-10xl: 150px;
            --text-10xl-line-height: 72px;
            --text-7xl: 72px;
            --text-7xl-line-height: 72px;
            --text-4xl: 40px;
            --text-4xl-line-height: 48px;
            --text-3xl: 32px;
            --text-3xl-line-height: 36px;
            --text-2xl: 24px;
            --text-2xl-line-height: 32px;
            --text-base: 16px;
            --text-base-line-height: 26px;
            --text-xs: 12px;
            --text-xs-line-height: 15px;
        } 
        h1 {
             @apply font-fraunces font-black text-7xl ; }
        h2 {
             @apply font-fraunces font-black text-base max-w-[290px] ; }
        h3 {
             @apply font-fraunces font-black text-3xl ; }
        h4 { 
            @apply font-fraunces font-black text-2xl ; }
        .p{
             @apply font-fraunces text-dark-blue text-[20px];
        }
    body{
        @apply bg-abled text-gray-800 ;
    }
    header{
        @apply flex items-center justify-between p-6 bg-black  ;
    }
    .img-logo{
        @apply w-20 h-20 rounded-full object-cover ring-2 ring-white shadow-md bg-white p-1 cursor-pointer hover:bg-cyan ;
    }
    .nav{
        @apply hidden md:flex gap-8
    }
    .a{
        @apply text-white font-bold uppercase px-3 py-1 rounded hover:text-cyan-400 hover:bg-gray-800 transition
    }
    button{
        @apply md:hidden text-white focus:outline-none hover:cursor-pointer
    }
    .mobile-a{
        @apply font-bold uppercase px-3 py-1 rounded hover:text-cyan-400 hover:bg-gray-800 transition
    }
    .div-section{
        @apply inline-block shadow-md p-4 rounded  m-[28px] bg-dark-cyan hover:border-4;
    }
    .video{
        @apply border-3 border-cyan shadow-cyan w-full h-120 object-cover rounded shadow-lg hover:shadow-light-cream border-2 ;
    }
    .section-3{
        @apply container text-center items-center mx-auto px-4 bg-red-50 my-[124px]
    }
    .order-links{
        @apply inline-block bg-cyan-400 text-black font-bold mt-[20px] px-5 py-2 rounded hover:bg-cyan-500 transition ;
    }
    .div-scroll{
        @apply min-w-[200px] bg-white p-4 rounded shadow hover:border hover:bg-cyan;
    }
    @keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); } /* adjust -50% depending on number of cards */
}

  .animate-scroll {
     animation: scroll 20s linear infinite;
     }
   footer{
    @apply  flex items-center justify-between p-6 bg-black ;
     }
   .div-links{
      @apply flex gap-7
      }
    .img-social{
        @apply w-10 h-10 rounded-full object-cover ring-2  p-1 cursor-pointer hover:bg-cyan ;
    }
  </style>
</head>

<body>
    <header id="home" class="header">
        <!-- Logo -->
        <a href="#" onclick="location.reload()" class="block">
            <img src="/images/image.png" alt="logo" class="img-logo">
        </a>

        <!-- Desktop Nav (≥768px) -->
        <nav class="nav">
            <a href="#home" class="a">HOME</a>
            <a href="#about" class="a">ABOUT</a>
            <a href="#" class="a">CONTACT</a>
        </nav>

        <!-- Mobile menu button -->
        <button id="mobile-btn" class="button">
            <!-- Hamburger icon -->
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
    </header>
    <!-- Mobile Nav (<768px) -->
    <nav id="mobile-nav" class="hidden flex-col bg-black text-white p-4 md:hidden gap-4">
        <a href="#home" class="mobile-a">HOME</a>
        <a href="#about" class="mobile-a">ABOUT</a>
        <a href="#contact" class="mobile-a">CONTACT</a>
    </nav>
    <main>
        <section class="p-6 bg-gray-100">
            <div>
                <!-- Video 1 -->
                <video src="/images/Monac 3D product animation 3D perfume.mp4" autoplay loop
                    muted class="video"></video>
        </section>
        <section>
            <div class="div-section" id="card-1">
                <img src="/images/strong-with-you.png" alt="parfum-1"
                    class="hover:shadow-black ml-[18%] w-[200px] h-[200px]">
                <div class="text-center items-center">
                    <h2 class="h2 pt-[20px]">STRONGER WITH YOU ABSOLUTELY</h2>
                    <p class="p max-w-[256px] pt-[20px]">Prix <br>950 dh</p>
                    <a href="order.html" class="order-links">
                        Order Now
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
